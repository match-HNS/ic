// ============================================
// HnsMatchSystem - PointScap Configuration
// ============================================

// === 时间设置 ===
hns_pointscap_detect_time "50"      // 占点检测时间（含冻结时间）
hns_pointscap_knife_time "40"       // CT刀杀奖励窗口（不含冻结时间）
hns_pointscap_stay_time "1.0"       // 占点停留判定时间（秒）

// === 点位分数（可动态调整）===
hns_pointscap_score_5 "2.0"         // 5人点分数
hns_pointscap_score_4 "1.0"         // 4人点分数
hns_pointscap_score_3 "0.5"         // 3人点分数

// === CT刀杀奖励 ===
hns_pointscap_knife_bonus "2"       // CT刀杀全灭奖励分

// === 目标分数 ===
hns_pointscap_target_score "30"     // Ascension模式目标分
hns_pointscap_vamp_init "30"        // Vampire模式初始分

// === 音效开关 ===
hns_pointscap_sound_capture "1"     // 占点音效 (0=关 1=开)
hns_pointscap_sound_knife "1"       // 刀杀奖励音效 (0=关 1=开)
hns_pointscap_sound_score "1"       // 积分音效 (0=关 1=开)

// === HUD显示 ===
hns_pointscap_hud_color "0 255 255" // HUD颜色 (R G B) 青蓝色
