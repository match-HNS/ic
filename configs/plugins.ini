; ==============================================
; ★ HNS 比赛系统插件 (精简版 - 13个核心)
; 已移除/禁用:
;   已删除: HnsMatchPointScap / HnsMatchSkin / HnsMatchAdminSkins / HnsMatchPlayerModels / HnsIC
;   已禁用: HnsMatchAITeams (AI已内置) / HnsMatchModeHud (HUD已内置)
;   v1.0.1 清理: TestBots(训练bot) / Ownage(踩头) / FlyNade(传送雷) / MapRules(piranesi)
;                flash-notifier(闪光提示) / jumpstats(跳跃统计) / SpectatorInfo(观战HUD)
; ==============================================

HnsMatchSystem.amxx       ; 核心比赛系统 (含AI报名系统)
HnsMatchSkinSystem.amxx   ; 皮肤系统 (玩家+管理员+发放)
;HnsMatchAITeams.amxx      ; ★ 已禁用: AI报名系统已内置
HnsMatchTraining.amxx     ; 训练工具 (仅训练模式可用)
HnsMatchPlayerInfo.amxx   ; 玩家信息 HUD / 排行榜 / 回合信息
HnsMatchWatcher.amxx      ; 观察员/裁判管理
HnsMatchStats.amxx        ; 核心统计数据引擎
HnsMatchPermSystem.amxx   ; 5级权限系统
HnsMatchServerCfg.amxx    ; 服务器CFG (穿墙开关)
HnsMatchMaps.amxx         ; 地图管理/投票/配置
HnsMatchRecontrol.amxx    ; 选手替换/控制权转移
HnsMatchChatmanager.amxx  ; 聊天管理 (比赛沟通可见性)
;HnsMatchModeHud.amxx      ; ★ 已禁用: 核心系统已内置模式HUD
;HnsMatchTestBots.amxx     ; ★ 已禁用: 训练bot，非比赛用
;HnsMatchSpectatorInfo.amxx ; ★ 已禁用: 观战HUD，非核心功能
;HnsMatchFlyNade.amxx      ; ★ 已禁用: 传送手雷，破坏比赛公平性
;HnsMatchOwnage.amxx       ; ★ 已禁用: 踩头音效，娱乐功能
;HnsMatchMapRules.amxx     ; ★ 已禁用: 仅针对de_piranesi水域，不在HNS地图池
;flash-notifier.amxx       ; ★ 已禁用: 闪光通知，纯信息提示
;hns_jumpstats.amxx        ; ★ 已禁用: KZ跳跃统计，训练工具
